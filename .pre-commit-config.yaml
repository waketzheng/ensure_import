repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
        args: [ --unsafe ]
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: check
        name: check by ruff/ty/bandit
        entry: ./scripts/check.py
        language: script

      - id: pypi
        name: ensure pypi for uv lock
        files: 'uv.lock'
        entry: pdm run fast pypi --slim
        language: system
